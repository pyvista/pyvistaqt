name: "CI"
permissions:
  statuses: write
  contents: write
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
env:
  ALLOW_PLOTTING: "true"

jobs:
  pip-pre:
    name: ${{ matrix.os }} / Python${{ matrix.python-version }} / ${{ matrix.qt }} / pyvista-main / qtpy-master
    runs-on: ${{ matrix.os}}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        qt: ["PySide6", "PyQt6"]
        python-version: ["3.14"]
        os: ["ubuntu-latest"]
        include:
          - qt: "PySide6"
            python-version: "3.14"
            os: "macos-latest"
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pyvista/setup-headless-display-action@main
        with:
          qt: true
          pyvista: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip wheel
          pip install --upgrade -e ".[test]" "${{ matrix.qt }}" --only-binary="${{ matrix.qt }}" https://github.com/pyvista/pyvista/zipball/main https://github.com/spyder-ide/qtpy/zipball/master trame-pyvista
        name: "Install dependencies with pip"
      - run: |
          python -c "import pyvista; print(pyvista.Report())"
        name: "Check report"
      - run: python pyvistaqt/rwi.py
        name: "Run QVTKRenderWidgetConeExample"
      - run: pytest -v --cov pyvistaqt --cov-report html
        name: "Run Tests"
      - uses: codecov/codecov-action@v7
        if: success()
        name: "Upload coverage to CodeCov"
        with:
          use_oidc: true

  pip:
    name: ${{ matrix.os }} / pip / ${{ matrix.qt }} / pyvista-${{ matrix.pyvista }}${{ matrix.vtk && ' / vtk'}}${{ matrix.vtk }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Default: latest PyVista + latest VTK on every supported OS
        os:
          ["ubuntu-latest", "macos-15-intel", "macos-latest", "windows-latest"]
        pyvista: ["0"]
        python-version: ["3.14"]
        vtk: [""]
        qt: ["PyQt6"]
        include:
          # Regression coverage across supported Python, PyVista, and VTK
          # versions. Each entry targets a distinct combination; Qt bindings
          # rotate so PyQt6/PySide6 each see a released PyVista.
          - os: "ubuntu-latest"
            pyvista: "0.43"
            python-version: "3.10"
            vtk: "==9.2.5"
            qt: "PyQt6"
          - os: "ubuntu-latest"
            pyvista: "0.44"
            python-version: "3.11"
            vtk: "==9.3.1"
            qt: "PyQt6"
          - os: "ubuntu-latest"
            pyvista: "0.45"
            python-version: "3.12"
            vtk: "==9.4.2"
            qt: "PyQt6"
          - os: "ubuntu-latest"
            pyvista: "0.46"
            python-version: "3.13"
            vtk: "==9.5.2"
            qt: "PySide6"
          - os: "ubuntu-latest"
            pyvista: "0.47"
            python-version: "3.13"
            vtk: "==9.5.2"
            qt: "PySide6"
          - os: "ubuntu-latest"
            pyvista: "0.48"
            python-version: "3.14"
            vtk: "==9.6.1"
            qt: "PySide6"

    defaults:
      run:
        shell: bash -e {0}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pyvista/setup-headless-display-action@main
        with:
          qt: true
          pyvista: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[test]"  "pyvista==${{ matrix.pyvista }}.*" "vtk${{ matrix.vtk }}" "${{ matrix.qt }}" --only-binary="vtk,{{ matrix.qt }},pyvista"
        name: "Install dependencies with pip"
      - run: |
          pip install "numpy<2"
        if: matrix.pyvista == '0.43'
        name: "Install old NumPy"
      - run: |
          python -c "import pyvista; print(pyvista.Report())"
        name: "Check report"
      - run: pytest -v --cov=pyvistaqt --cov-report=html -m "not slow" tests/
        name: "Run most tests" # the slow tests are *really* slow on Intel sometimes
        if: matrix.os == 'macos-15-intel'
      - run: pytest -v --cov=pyvistaqt --cov-report=html tests/
        name: "Run all tests"
        if: matrix.os != 'macos-15-intel'
      - uses: codecov/codecov-action@v7
        if: success()
        name: "Upload coverage to CodeCov"
        with:
          use_oidc: true

  conda:
    name: ${{ matrix.os }} / conda / ${{ matrix.qt }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          ["ubuntu-latest", "macos-15-intel", "macos-latest", "windows-latest"]
        qt: ["PySide6"]
        python-version: ["3.12"]
    defaults:
      run:
        shell: bash -el {0}
    env:
      ALLOW_PLOTTING: "true"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pyvista/setup-headless-display-action@main
        with:
          qt: true
          pyvista: false
      - uses: mamba-org/setup-micromamba@v3
        with:
          # https://github.com/mamba-org/setup-micromamba/issues/225
          micromamba-version: 1.5.10-0
          environment-file: "environment.yml"
          environment-name: "pyvistaqt-env"
          create-args: >-
            python=${{ matrix.python-version }} ${{ matrix.qt }}
      - run: |
          pip install -e .
          python -c "import pyvista; print(pyvista.Report())"
        name: "Install pyvistaqt and check report"
      - run: pytest -v --cov pyvistaqt --cov-report html
        name: "Run Tests"
      - uses: codecov/codecov-action@v7
        if: success()
        name: "Upload coverage to CodeCov"
        with:
          use_oidc: true
