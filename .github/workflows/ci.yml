name: "CI"
permissions:
  statuses: write
  contents: write
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
  schedule:
    - cron: "0 4 * * *"

jobs:
  pip-pre:
    name: ${{ matrix.os }} / Python${{ matrix.python }} / ${{ matrix.qt }} / pyvista-main / qtpy-master
    runs-on: ${{ matrix.os}}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        qt: ["None", "PySide6", "PyQt5", "PyQt6"]
        python: ["3.13", "3.14"]
        os: ["ubuntu-latest"]
        include:
          - qt: "PySide6"
            python: "3.14"
            os: "macos-latest"
    defaults:
      run:
        shell: bash -e {0}
    env:
      ALLOW_PLOTTING: "true"
      PYTHON_VERSION: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v6
      - uses: pyvista/setup-headless-display-action@main
        with:
          qt: true
          pyvista: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m pip install --upgrade pip wheel
          pip install --upgrade -e ".[test]"
          pip install --upgrade --progress-bar off https://github.com/pyvista/pyvista/zipball/main https://github.com/spyder-ide/qtpy/zipball/master
        name: "Install dependencies with pip"
      - run: pip install ${{ matrix.qt }}
        name: "Install Qt binding"
        if: matrix.qt != 'None'
      - run: pip install "PyQt6-Qt6!=6.6.0,!=6.7.0" "PyQt6!=6.6.0"
        name: "Install PyQt6-Qt6"
        if: matrix.qt == 'PyQt6'
      - run: pip install "PySide6!=6.7.0"
        name: "Install PySide6"
        if: matrix.qt == 'PySide6'
      - run: |
          pip install -e .
          python -c "import pyvista; print(pyvista.Report())"
        name: "Install pyvistaqt"
      - run: python pyvistaqt/rwi.py
        name: "Run QVTKRenderWidgetConeExample"
        if: matrix.qt != 'None'
      - run: pytest -v --cov pyvistaqt --cov-report html
        name: "Run Tests"
        if: matrix.qt != 'None'
      - run: |
          pip uninstall -y pytest-qt
          pytest -v tests/test_qt.py
        name: "Import without Qt"
        if: matrix.qt == 'None'
      - uses: codecov/codecov-action@v6
        if: success()
        name: "Upload coverage to CodeCov"
        with:
          use_oidc: true

  pip:
    name: ${{ matrix.os }} / pip / ${{ matrix.qt }} / pyvista-${{ matrix.pyvista }}${{ matrix.vtk && ' / vtk'}}${{ matrix.vtk }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Default: latest PyVista + latest VTK on every supported OS
        os:
          ["ubuntu-latest", "macos-15-intel", "macos-latest", "windows-latest"]
        pyvista: ["0"]
        python-version: ["3.14"]
        vtk: [""]
        qt: ["PyQt6"]
        include:
          # Regression coverage across supported Python, PyVista, and VTK
          # versions. Each entry targets a distinct combination; Qt bindings
          # rotate so PyQt5/PyQt6/PySide6 each see a released PyVista.
          - os: "ubuntu-latest"
            pyvista: "0.39"
            python-version: "3.10"
            vtk: ""
            qt: "PyQt6"
          - os: "ubuntu-latest"
            pyvista: "0.42"
            python-version: "3.11"
            vtk: ""
            qt: "PyQt6"
          - os: "ubuntu-latest"
            pyvista: "0.44"
            python-version: "3.12"
            vtk: "==9.3.1"
            qt: "PyQt5"
          - os: "ubuntu-latest"
            pyvista: "0.45"
            python-version: "3.13"
            vtk: "==9.4.2"
            qt: "PyQt6"
          - os: "ubuntu-latest"
            pyvista: "0.46"
            python-version: "3.13"
            vtk: "==9.5.2"
            qt: "PySide6"

    defaults:
      run:
        shell: bash -e {0}
    env:
      ALLOW_PLOTTING: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: pyvista/setup-headless-display-action@main
        with:
          qt: true
          pyvista: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
        name: "Setup python"
      - run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[test]" "vtk${{ matrix.vtk }}" --only-binary vtk
        name: "Install dependencies with pip"
      - run: pip install "PyQt6-Qt6!=6.6.0,!=6.7.0" "PyQt6!=6.6.0"
        name: "Install Qt binding (PyQt6)"
        if: matrix.qt == 'PyQt6'
      - run: pip install "PyQt5"
        name: "Install Qt binding (PyQt5)"
        if: matrix.qt == 'PyQt5'
      - run: pip install "PySide6!=6.7.0"
        name: "Install Qt binding (PySide6)"
        if: matrix.qt == 'PySide6'
      - run: |
          pip install --upgrade "pyvista==${{ matrix.pyvista }}.*"
          # PyVista < 0.44 requires numpy < 2
          if [[ "${{ matrix.pyvista }}" != "0" ]] && [[ "${{ matrix.pyvista }}" < "0.44" ]]; then
            pip install "numpy<2"
          fi
          # PyVista < 0.45 requires vtk < 9.4 (unless an explicit vtk is set)
          if [[ "${{ matrix.pyvista }}" != "0" ]] && [[ "${{ matrix.pyvista }}" < "0.45" ]] && [[ -z "${{ matrix.vtk }}" ]]; then
            pip install "vtk<9.4"
          fi
        name: "Install PyVista ${{ matrix.pyvista }}"
      - run: |
          pip install -e .
          python -c "import pyvista; print(pyvista.Report())"
        name: "Install pyvistaqt"
      - run: pytest -v --cov pyvistaqt --cov-report html
        name: "Run Tests"
      - uses: codecov/codecov-action@v6
        if: success()
        name: "Upload coverage to CodeCov"
        with:
          use_oidc: true

  conda:
    name: ${{ matrix.os }} / conda / ${{ matrix.qt }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          ["ubuntu-latest", "macos-15-intel", "macos-latest", "windows-latest"]
        qt: ["PySide6"]
        python-version: ["3.12"]
    defaults:
      run:
        shell: bash -el {0}
    env:
      ALLOW_PLOTTING: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: pyvista/setup-headless-display-action@main
        with:
          qt: true
          pyvista: false
      - uses: mamba-org/setup-micromamba@v3
        with:
          # https://github.com/mamba-org/setup-micromamba/issues/225
          micromamba-version: 1.5.10-0
          environment-file: "environment.yml"
          environment-name: "pyvistaqt-env"
          create-args: >-
            python=${{ matrix.python-version }} ${{ matrix.qt }}
      - run: |
          pip install -e .
          python -c "import pyvista; print(pyvista.Report())"
        name: "Install pyvistaqt"
      - run: pytest -v --cov pyvistaqt --cov-report html
        name: "Run Tests"
      - uses: codecov/codecov-action@v6
        if: success()
        name: "Upload coverage to CodeCov"
        with:
          use_oidc: true
